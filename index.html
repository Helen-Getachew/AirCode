<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0a1e" />
  <meta name="description" content="AirCode - Learn to code offline. Think like a computer." />
  <title>AirCode</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="main.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>

  <div id="app">

    <!-- Offline/Online status badge -->
    <div id="connection-badge" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;
      padding:6px 12px;text-align:center;font-size:12px;font-weight:600;color:#fff;
      transition:background 0.3s, transform 0.3s;transform:translateY(-100%)">
    </div>

    <!-- Sync confirmation toast -->
    <div id="sync-toast" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      z-index:9999;padding:10px 18px;background:var(--success);color:#fff;border-radius:24px;
      font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.3);animation:fadeIn 0.3s ease">
      ✅ Back online — progress synced
    </div>

    <!-- Tooltip container (for metric explanations) -->
    <div id="tooltip-container" style="position:fixed;z-index:9998;pointer-events:none;opacity:0;
      transition:opacity 0.2s;background:var(--surface);border:1px solid var(--border);
      border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);max-width:220px;
      box-shadow:0 4px 16px rgba(0,0,0,0.3)">
    </div>

    <!-- Screen: Login -->
    <div id="screen-login" class="screen">
      <div class="auth-box">
        <div class="auth-logo">
          <div class="auth-logo-icon">⌨️</div>
          <div class="app-logo">AirCode</div>
          <p class="app-tagline">Learn to code. Think like a computer.</p>
        </div>
        <div id="auth-form"></div>
      </div>
    </div>

    <!-- Main App (with bottom nav) -->
    <div id="screen-main" class="screen">

      <!-- Tab: Learn -->
      <div id="tab-learn" class="tab-content active-tab">
        <header class="top-bar">
          <div>
            <div class="app-name">AirCode</div>
            <div class="top-subtitle">What do you want to learn?</div>
          </div>
          <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark/light theme">☀️</button>
        </header>

        <!-- Stats bar: streak, level, trace accuracy -->
        <div id="stats-bar" style="display:flex;gap:10px;padding:10px 16px;background:var(--surface2)">
          <div style="flex:1;text-align:center;cursor:pointer" class="stat-item" data-tooltip="Days you've coded in a row. Keep it up!">
            <div style="font-size:18px;font-weight:700;color:var(--accent)" id="stat-streak">🔥 0</div>
            <div style="font-size:10px;color:var(--text-muted)">day streak</div>
          </div>
          <div style="flex:1;text-align:center;cursor:pointer" class="stat-item" data-tooltip="Your current level. Complete lessons and exams to level up!">
            <div style="font-size:18px;font-weight:700;color:var(--accent)" id="stat-level">Lv 1</div>
            <div style="font-size:10px;color:var(--text-muted)">level</div>
          </div>
          <div style="flex:1;text-align:center;cursor:pointer" class="stat-item" data-tooltip="How well you trace code execution. Practice predicting outputs before running!">
            <div style="font-size:18px;font-weight:700;color:var(--accent)" id="stat-trace">–</div>
            <div style="font-size:10px;color:var(--text-muted)">trace accuracy</div>
          </div>
        </div>

        <div id="subject-list"></div>
      </div>

      <!-- Tab: Levels (inside Learn) -->
      <div id="tab-levels" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-home" class="icon-btn" aria-label="Go back">←</button>
          <div id="subject-title" class="screen-title"></div>
          <button class="icon-btn theme-toggle" aria-label="Toggle theme">☀️</button>
        </header>
        <div id="level-list"></div>
      </div>

      <!-- Tab: Lessons List (inside Learn) -->
      <div id="tab-lessons" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-levels" class="icon-btn" aria-label="Go back">←</button>
          <div id="level-title" class="screen-title"></div>
          <button class="icon-btn theme-toggle" aria-label="Toggle theme">☀️</button>
        </header>
        <div id="lesson-list"></div>
      </div>

      <!-- Tab: Lesson Detail -->
      <div id="tab-lesson" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-lessons" class="icon-btn" aria-label="Go back">←</button>
          <div id="lesson-title" class="screen-title"></div>
          <button class="icon-btn theme-toggle" aria-label="Toggle theme">☀️</button>
        </header>
        <div id="lesson-content"></div>
      </div>

      <!-- Tab: Exam -->
      <div id="tab-exam" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-exam" class="icon-btn" aria-label="Go back">←</button>
          <div class="screen-title">Level Exam</div>
          <div style="width:40px"></div>
        </header>
        <div id="exam-content"></div>
      </div>

      <!-- Tab: Practice -->
      <div id="tab-practice" class="tab-content">
        <header class="top-bar">
          <div>
            <div class="app-name">Practice</div>
            <div class="top-subtitle">Build and experiment</div>
          </div>
          <button class="icon-btn theme-toggle" aria-label="Toggle theme">☀️</button>
        </header>
        <div id="practice-content"></div>
      </div>

      <!-- Tab: Editor -->
      <div id="tab-editor" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-editor" class="icon-btn" aria-label="Go back">←</button>
          <div class="screen-title" id="editor-title">Code Editor</div>
          <button class="icon-btn theme-toggle" aria-label="Toggle theme">☀️</button>
        </header>
        <div id="editor-content"></div>
      </div>

      <!-- Tab: Profile -->
      <div id="tab-profile" class="tab-content">
        <header class="top-bar">
          <div>
            <div class="app-name">Profile</div>
            <div class="top-subtitle">Your account</div>
          </div>
          <button class="icon-btn theme-toggle" aria-label="Toggle theme">☀️</button>
        </header>
        <div id="profile-content"></div>
      </div>

     <!-- Bottom Navigation -->
      <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
        <button class="nav-btn active" data-tab="learn" aria-label="Learn" aria-current="page">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0[...]
          </span>
          <span class="nav-label">Learn</span>
        </button>
        <button class="nav-btn" data-tab="practice" aria-label="Practice">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><poly[...]
          </span>
          <span class="nav-label">Practice</span>
        </button>
        <button class="nav-btn" data-tab="profile" aria-label="Profile">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0[...]
          </span>
          <span class="nav-label">Profile</span>
        </button>
      </nav>
    </div>

  </div>

  <script src="skulpt.min.js"></script>
  <script src="skulpt-stdlib.js"></script>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script src="ui.js"></script>
  <script src="lessons.js"></script>
  <script src="router.js"></script>
  <script src="editor.js"></script>
  <script src="app.js"></script>

</body>
</html>
