<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0a1e" />
  <title>AirCode</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <div id="app">

    <!-- Offline/Online status badge -->
    <div id="connection-badge" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;
      padding:6px 12px;text-align:center;font-size:12px;font-weight:600;color:#fff;
      transition:background 0.3s">
    </div>

    <!-- Sync confirmation toast -->
    <div id="sync-toast" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      z-index:999;padding:10px 18px;background:var(--success);color:#fff;border-radius:24px;
      font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.3)">
      ✅ Back online — progress synced
    </div>

    <!-- Screen: Login -->
    <div id="screen-login" class="screen">
      <div class="auth-box">
        <div class="auth-logo">
          <div class="auth-logo-icon">⌨️</div>
          <div class="app-logo">AirCode</div>
          <p class="app-tagline">Learn to code. Think like a computer.</p>
        </div>
        <div id="auth-form"></div>
      </div>
    </div>

    <!-- Main App (with bottom nav) -->
    <div id="screen-main" class="screen">

      <!-- Tab: Learn -->
      <div id="tab-learn" class="tab-content active-tab">
        <header class="top-bar">
          <div>
            <div class="app-name">AirCode</div>
            <div class="top-subtitle">What do you want to learn?</div>
          </div>
          <button id="theme-toggle" class="icon-btn">☀️</button>
        </header>
        <div id="subject-list"></div>
      </div>

      <!-- Tab: Levels (inside Learn) -->
      <div id="tab-levels" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-home" class="icon-btn">←</button>
          <div id="subject-title" class="screen-title"></div>
          <button class="icon-btn theme-toggle">☀️</button>
        </header>
        <div id="level-list"></div>
      </div>

      <!-- Tab: Lessons List (inside Learn) -->
      <div id="tab-lessons" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-levels" class="icon-btn">←</button>
          <div id="level-title" class="screen-title"></div>
          <button class="icon-btn theme-toggle">☀️</button>
        </header>
        <div id="lesson-list"></div>
      </div>

      <!-- Tab: Lesson Detail -->
      <div id="tab-lesson" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-lessons" class="icon-btn">←</button>
          <div id="lesson-title" class="screen-title"></div>
          <button class="icon-btn theme-toggle">☀️</button>
        </header>
        <div id="lesson-content"></div>
      </div>

      <!-- Tab: Exam -->
      <div id="tab-exam" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-exam" class="icon-btn">←</button>
          <div class="screen-title">Level Exam</div>
          <div style="width:40px"></div>
        </header>
        <div id="exam-content"></div>
      </div>

      <!-- Tab: Practice -->
      <div id="tab-practice" class="tab-content">
        <header class="top-bar">
          <div>
            <div class="app-name">Practice</div>
            <div class="top-subtitle">Build and experiment</div>
          </div>
          <button class="icon-btn theme-toggle">☀️</button>
        </header>
        <div id="practice-content"></div>
      </div>

      <!-- Tab: Editor -->
      <div id="tab-editor" class="tab-content">
        <header class="top-bar">
          <button id="btn-back-editor" class="icon-btn">←</button>
          <div class="screen-title" id="editor-title">Editor</div>
          <button class="icon-btn theme-toggle">☀️</button>
        </header>
        <div id="editor-content"></div>
      </div>

      <!-- Tab: Profile -->
      <div id="tab-profile" class="tab-content">
        <header class="top-bar">
          <div>
            <div class="app-name">Profile</div>
            <div class="top-subtitle">Your account</div>
          </div>
          <button class="icon-btn theme-toggle">☀️</button>
        </header>
        <div id="profile-content"></div>
      </div>

     <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="learn">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </span>
          <span class="nav-label">Learn</span>
        </button>
        <button class="nav-btn" data-tab="practice">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          </span>
          <span class="nav-label">Practice</span>
        </button>
        <button class="nav-btn" data-tab="profile">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <span class="nav-label">Profile</span>
        </button>
      </nav>
    </div>

  </div>

  <script src="libs/skulpt/skulpt.min.js"></script>
  <script src="libs/skulpt/skulpt-stdlib.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/lessons.js"></script>
  <script src="js/router.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
